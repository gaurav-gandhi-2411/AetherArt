name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Use Ubuntu 22.04 runner to avoid issues with Ubuntu 24.04
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3️⃣ Upgrade pip and install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Lint code (optional, non-fatal)
      - name: Lint
        run: |
          pip install flake8
          flake8 aetherart || true

      # 5️⃣ Run tests
      - name: Run tests
        run: |
          pip install pytest
          pytest -q
