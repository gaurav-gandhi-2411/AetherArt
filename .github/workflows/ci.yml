name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install package & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: |
          flake8 aetherart/ app.py scripts/ tests/

      - name: Format check (black)
        run: |
          black --check aetherart/ app.py scripts/ tests/

      - name: Import order check (isort)
        run: |
          isort --check-only aetherart/ app.py scripts/ tests/

      - name: Type check (mypy)
        run: |
          mypy aetherart

      - name: Run tests
        run: |
          pytest --cov=aetherart --cov-report=term-missing --cov-report=xml -q
