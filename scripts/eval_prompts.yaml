# PartiPrompts evaluation subset — 30 prompts
#
# Source: nateraw/parti-prompts (HuggingFace)
#   https://huggingface.co/datasets/nateraw/parti-prompts
#
# Selection criteria:
#   - Balanced across 11 PartiPrompts categories
#   - Three difficulty tiers (8 easy / 19 medium / 3 hard)
#   - Easy:   single subject, Basic challenge level — tests core object/concept fidelity
#   - Medium: multi-element scenes, Fine-grained Detail challenge — tests composition & detail
#   - Hard:   surreal/stylistic combinations, Imagination challenge or conceptually unusual
#     Fine-grained Detail — tests generalization limits
#
# Fields:
#   id                 unique run ID (used as filename prefix)
#   prompt             exact text from PartiPrompts
#   category           PartiPrompts category
#   parti_challenge    original PartiPrompts challenge label
#   expected_difficulty  easy | medium | hard

prompts:

